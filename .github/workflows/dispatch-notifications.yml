name: Dispatch Notifications

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call notification dispatcher
        env:
          DISPATCH_URL: ${{ secrets.DISPATCH_URL }}
        run: |
          curl --fail --show-error --silent --request POST --url "$DISPATCH_URL"
